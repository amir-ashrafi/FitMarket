<section class="flex justify-center">
<p-toast />
<div class="card form_blog rounded-xl bg-indigo-200 dark:bg-indigo-900 px-4 py-5 max-w-[650px]">
    <form [formGroup]="exampleForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
            <p-editor formControlName="text" [invalid]="isInvalid('text')" [style]="{ height: '320px' }" />
            @if (isInvalid('text')) {
                <p-message severity="error" size="small" variant="simple">Content is required.</p-message>
            }
        </div>
        <div class="card save_button flex font-bold  space-x-3">
        <button class="text-indigo-600 dark:text-indigo-100 dark:bg-indigo-950 dark:border-indigo-100 bg-indigo-100 border-2 border-indigo-800 px-5 rounded-lg space-x-3 py-3 basis-2/3 flex items-center justify-center">
            <span class="pi pi-check"></span>
            <span >ذخیره</span>
        </button>
        <button class="bg-red-100 text-red-500 dark:bg-red-950 dark:text-red-50 dark:border-red-400 border-2 border-red-800 px-2 rounded-lg space-x-3 py-3 basis-1/5 flex items-center justify-center">
            <span class="pi pi-trash"></span>
            <span>حذف</span>
        </button>
        <button class="bg-slate-200 dark:bg-slate-900 dark:text-slate-50 dark:border-slate-50 text-slate-900 border-2 border-slate-800 px-2 rounded-lg space-x-3 py-3 basis-1/5 flex items-center justify-center">
            <span class="pi pi-times"></span>
            <span>خروج</span>
        </button>
    </div>
    </form>
</div>
</section>
