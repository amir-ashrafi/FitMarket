<div class="bg-gray-900 flex w-full text-gray-300 pt-16 pb-8" dir="rtl">
    <div class="basis-1/6 mx-10">
        <div class="card flex justify-start space-x-2 px-3 py-5 items-center font-semibold">
            <p-image src="/fitmarket.webp" alt="Image" width="35" />
            <p class="text-blue-400 dark:text-white font-semibold text-2xl">فیت مارکت</p>
        </div>
        <p>بهترین فروشگاه تجهیزات ورزشی و مکمل‌های بدنسازی در ایران</p>
        <div class="flex">
            @for (item of icon; track item.id) {
                <p-button [icon]="item.name" [rounded]="true" [text]="true" />
            }
        </div>
    </div>
    <div class="flex justify-between basis-5/6 mx-10  items-start">
        @for (items of footer_items; track items.id) {
            <ul class="flex flex-col gap-4">
                <span class="font-bold text-xl">{{items.name}}</span>
                @for (item of items.children; track item.id) {
                    <a [routerLink]="item.link">
                        <li>
                            {{item.name}}
                        </li>
                    </a>
                }
            </ul>
        }
    </div>
    
</div>
